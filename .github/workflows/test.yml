name: Test

env:
  PUPPETEER_SKIP_DOWNLOAD: true

# Controls when the action will run.
on:
  # Triggers the workflow on pull request events but only for the main branch
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  test:
    permissions:
      contents: read

    name: Test - ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            puppeteer-executable-path: /usr/bin/google-chrome
          - os: windows-latest
            puppeteer-executable-path: 'C:\Program Files\Google\Chrome\Application\chrome.exe'

    runs-on: ${{ matrix.os }}

    env:
      PUPPETEER_EXECUTABLE_PATH: ${{ matrix.puppeteer-executable-path }}

    concurrency:
      group: test-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Install Pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: true

      - name: Run Test
        run: pnpm run test

  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Install Pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: true

      - name: Lint
        run: |
          pnpm run prettier:ci
          pnpm run lint
