packages:
  - '.'
  - 'tests'
  - 'example'

allowBuilds:
  puppeteer: true
  simple-git-hooks: false

minimumReleaseAgeExclude:
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rslint/*'
  - '@rspack/*'
  - '@rspress/*'
  - '@rstackjs/*'
  - '@rstest/*'
  - '@typescript/*'
  - 'rsbuild-plugin-*'
  - rstack
  - typescript
